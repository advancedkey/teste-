<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página Simples</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f9f9f9;
      color: #333;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      max-width: 600px;
      margin: auto;
    }
    h1 {
      color: #2b6cb0;
    }
    a {
      color: #2b6cb0;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Olá!</h1>
    <p>Esta é uma página simples criada em HTML.</p>
    <p>Você pode editar o texto e salvar como <strong>index.html</strong>.</p>
    <p><a href="#">Clique aqui</a> para um exemplo de link.</p>
  </div>
</body>
</html>
